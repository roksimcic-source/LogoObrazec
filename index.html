<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="CSS/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registriraj se - Spotify</title>
    <link rel="shotcut icon" href="slike/spotify.png" type="image/x-icon">
</head>

<body>
	<header class="glava">
	
        <svg xmlns="http://www.w3.org/2000/svg" 
			viewBox="0 0 496 512" 
			height="50px"
			width="50px"
			>
			<path fill="#1ed760" d="M248 8C111.1 8 0 119.1 0 256s111.1 248 248 248 248-111.1 248-248S384.9 8 248 8Z"/>
			<path d="M406.6 231.1c-5.2 0-8.4-1.3-12.9-3.9-71.2-42.5-198.5-52.7-280.9-29.7-3.6 1-8.1 2.6-12.9 2.6-13.2 0-23.3-10.3-23.3-23.6 0-13.6 8.4-21.3 17.4-23.9 35.2-10.3 74.6-15.2 117.5-15.2 73 0 149.5 15.2 205.4 47.8 7.8 4.5 12.9 10.7 12.9 22.6 0 13.6-11 23.3-23.2 23.3zm-31 76.2c-5.2 0-8.7-2.3-12.3-4.2-62.5-37-155.7-51.9-238.6-29.4-4.8 1.3-7.4 2.6-11.9 2.6-10.7 0-19.4-8.7-19.4-19.4s5.2-17.8 15.5-20.7c27.8-7.8 56.2-13.6 97.8-13.6 64.9 0 127.6 16.1 177 45.5 8.1 4.8 11.3 11 11.3 19.7-.1 10.8-8.5 19.5-19.4 19.5zm-26.9 65.6c-4.2 0-6.8-1.3-10.7-3.6-62.4-37.6-135-39.2-206.7-24.5-3.9 1-9 2.6-11.9 2.6-9.7 0-15.8-7.7-15.8-15.8 0-10.3 6.1-15.2 13.6-16.8 81.9-18.1 165.6-16.5 237 26.2 6.1 3.9 9.7 7.4 9.7 16.5s-7.1 15.4-15.2 15.4z"/>
		</svg>
		
		
    </header>
    <div class="glavni">
	
		<div class="naslov">
            <h1>Registriraj se in <br />začni poslušati</h1>
        </div>
		<div class="prviDiv">
		
		<form id="emailForm">
			<div class="epostatext">
				<div class="enaslov">
					<label>E-poštni naslov</label>
				</div>
				<div class="textfield">
                    <input type="email" name="email" placeholder="name@gmail.com" id="emailField">
                </div>
				<div class="alert">
                    <span class="alertSpan">
                        Ta e-poštni naslov je neveljaven. Napisan mora biti v obliki example@gmail.com
                    </span>
                </div>
				<div class="geslo">
					<label>Geslo</label>
				</div>
				<div class="textfield">
					<input type="password" name="password" placeholder="************" required="" id="passwordField">
				</div>
				<div>
					<button type="submit" value="Prijavi se" id="gumb1">Prijavi se </button>
				</div>
			</div>
		</form>
		</div>
		
		<div class="aliDiv">
            <div class="ali">
                <h4>ali</h4>
            </div>
        </div>
		
		<div class="povezave">
			<div>
				<button type="button" class="google"><img src="slike/google.png" width="25" height="24" class="ikonagoogle">
				<span class="registrirajbarva">Nadaljuj z Googlom</span></button>
			</div>
			
			<div id="facebookdiv">
				<button type="button" class="facebook"><img src="slike/facebook.png" class="ikonafacebook" width="25" height="24">
				<span class="naprejbarva"><span class="registrirajbarva">Nadaljuj s Facebookom</span></span></button>
			</div>
			
			<div id="applediv">
                <button type="button" class="apple"><img src="slike/apple.png" class="ikonaapple" width="20" height="24">
				<span class="registrirajbarva">Nadaljuj z Applom</span></button>
			</div>
		</div>
		
		<div class="textZeImasRacun">
            <p>
                <a id="prviDel">Nimaš računa? </a><br>
                <a id="drugiDel" href="registracija.html">Registriraj se</a>
            </p>
         </div>
		<footer class="noga">
            <span id="nogaID">
                <p>To spletno mesto je zaščiteno z reCAPTCHA. Veljata Googlov</p>
                <a id="del1" href="https://policies.google.com/privacy" target="_blank"
                    >pravilnik o zasebnosti</a>
                in
                <a id="del2" href="https://policies.google.com/terms" target="_blank">pogoji storitve</a>.<span id="trigger" style="cursor: pointer;"></span>
            </span>
        </footer>
		<!-- Popup HTML -->
		<div id="overlay"></div>
		<div class="popup" id="popup">
		  <span class="closePopup" id="closePopup">&times;</span>
		  <p>Vaše sporočilo tukaj!</p>
		  <button class="gumb_popup" id="popupBtn">OK</button>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script src="js/index.js"></script>
</body>
</html>
